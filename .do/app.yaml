name: artbliss-deck
region: sfo
features:
  - buildpack-stack=ubuntu-22

static_sites:
  - name: dashboard
    github:
      repo: YOUR_GITHUB_USER/art-bliss-research
      branch: main
      deploy_on_push: true
    source_dir: /site
    environment_slug: html
    catchall_document: index.html
    error_document: index.html
    output_dir: /

# After connecting GitHub:
#   doctl auth init
#   doctl apps create --spec .do/app.yaml
#
# Custom domain (Control Panel → App → Settings → Domains):
#   artbliss-deck.mindmakina.com
